name: "Android"

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: setup java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: setup android sdk
        uses: android-actions/setup-android@v3

      - name: install android ndk
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      - name: install rust stable + android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - name: setup android keystore
        if: ${{ secrets.ANDROID_KEY_STORE != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEY_STORE }}" | base64 -d > /tmp/keystore.jks
          echo "storeFile=/tmp/keystore.jks" >> src-tauri/gen/android/keystore.properties
          echo "storePassword=${{ secrets.ANDROID_KEY_STORE_PASSWORD }}" >> src-tauri/gen/android/keystore.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> src-tauri/gen/android/keystore.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> src-tauri/gen/android/keystore.properties

      - name: build android apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: npx tauri android build --apk

      - name: upload apk to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
