name: "Android"

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: setup java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: setup android ndk
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"
          NDK_HOME=$ANDROID_SDK/ndk/27.2.12479018
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          echo "$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: install rust stable + android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - name: init tauri android project
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npx tauri android init

      # ── Signing ────────────────────────────────────────────────────────────
      # To enable release signing, add these GitHub Secrets:
      #   ANDROID_KEY_STORE   — base64-encoded .jks keystore file
      #     (generate: keytool -genkey -v -keystore cuckoo.jks -alias cuckoo \
      #                 -keyalg RSA -keysize 2048 -validity 10000)
      #     (encode:   base64 -i cuckoo.jks | pbcopy)
      #   ANDROID_KEY_ALIAS        — alias used during keytool -genkey (e.g. "cuckoo")
      #   ANDROID_KEY_PASSWORD     — key password
      #   ANDROID_STORE_PASSWORD   — keystore password (often same as key password)
      # If no secrets configured, the build produces an unsigned debug APK for testing.
      - name: setup android signing
        if: ${{ env.ANDROID_KEY_STORE != '' }}
        env:
          ANDROID_KEY_STORE: ${{ secrets.ANDROID_KEY_STORE }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEY_STORE" | base64 -d > /tmp/cuckoo.jks
          cat > src-tauri/gen/android/keystore.properties << EOF
          storeFile=/tmp/cuckoo.jks
          storePassword=${ANDROID_STORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF
          # Inject signing config into generated build.gradle.kts
          python3 - << 'PYEOF'
          import re, sys

          path = "src-tauri/gen/android/app/build.gradle.kts"
          with open(path) as f:
              src = f.read()

          props_loader = """
          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = java.util.Properties().also { props ->
              if (keystorePropertiesFile.exists()) props.load(keystorePropertiesFile.inputStream())
          }
          """

          signing_cfg = """
              signingConfigs {
                  create("release") {
                      if (keystorePropertiesFile.exists()) {
                          storeFile = file(keystoreProperties["storeFile"] as String)
                          storePassword = keystoreProperties["storePassword"] as String
                          keyAlias = keystoreProperties["keyAlias"] as String
                          keyPassword = keystoreProperties["keyPassword"] as String
                      }
                  }
              }
          """

          # Add loader before android { block
          src = props_loader + src
          # Insert signingConfigs after "android {"
          src = re.sub(r'(android \{)', r'\1\n' + signing_cfg, src, count=1)
          # Apply signing to release buildType
          src = re.sub(
              r'(release \{[^}]*?)(\})',
              r'\1    signingConfig = signingConfigs.getByName("release")\n        \2',
              src, count=1, flags=re.DOTALL
          )
          with open(path, "w") as f:
              f.write(src)
          print("Signing config injected.")
          PYEOF

      - name: build android apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npx tauri android build --apk

      - name: upload apk to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
