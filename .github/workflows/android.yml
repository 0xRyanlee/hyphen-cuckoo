name: "Android"

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: setup java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: setup android ndk
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"
          NDK_HOME=$ANDROID_SDK/ndk/27.2.12479018
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          echo "$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: install rust stable + android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - name: init tauri android project
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npx tauri android init

      # ── Signing ────────────────────────────────────────────────────────────
      # To enable release signing, add these GitHub Secrets:
      #   ANDROID_KEY_STORE        — base64-encoded .jks keystore file
      #     (generate: keytool -genkey -v -keystore cuckoo.jks -alias cuckoo \
      #                 -keyalg RSA -keysize 2048 -validity 10000)
      #     (encode:   base64 -i cuckoo.jks | tr -d '\n' | gh secret set ANDROID_KEY_STORE)
      #   ANDROID_KEY_ALIAS        — alias used during keytool -genkey (e.g. "cuckoo")
      #   ANDROID_KEY_PASSWORD     — key password
      #   ANDROID_STORE_PASSWORD   — keystore password (often same as key password)
      # If no secrets configured, the build produces an unsigned release APK for testing.
      - name: check signing secrets
        id: signing
        env:
          ANDROID_KEY_STORE: ${{ secrets.ANDROID_KEY_STORE }}
        run: |
          if [ -n "$ANDROID_KEY_STORE" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Release signing ENABLED."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ANDROID_KEY_STORE secret set — building an UNSIGNED release APK (cannot be installed on production PADs)."
          fi

      - name: setup android signing
        if: steps.signing.outputs.enabled == 'true'
        env:
          ANDROID_KEY_STORE: ${{ secrets.ANDROID_KEY_STORE }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          CUCKOO_KEYSTORE_PATH: /tmp/cuckoo.jks
        run: |
          echo "$ANDROID_KEY_STORE" | base64 -d > /tmp/cuckoo.jks
          python3 scripts/sign-android.py

      - name: build android apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npx tauri android build --apk

      - name: upload apk to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
