name: "Android"

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: setup java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: setup android ndk
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_SDK/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: install rust stable + android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - name: init tauri android project
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npx tauri android init

      - name: build android apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npx tauri android build --apk

      - name: upload apk to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
