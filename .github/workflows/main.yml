name: "CI"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libnm-dev libcloudproviders-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: frontend type check
        run: npx tsc --noEmit

      - name: build frontend (required for Tauri resource validation)
        run: npm run build

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

  check-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: install rust stable + android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: setup android ndk
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"
          NDK_TOOLCHAIN=$ANDROID_SDK/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "$NDK_TOOLCHAIN" >> $GITHUB_PATH
          echo "NDK_HOME=$ANDROID_SDK/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - name: cargo check android target
        env:
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: aarch64-linux-android21-clang
        run: cargo check --manifest-path src-tauri/Cargo.toml --target aarch64-linux-android
